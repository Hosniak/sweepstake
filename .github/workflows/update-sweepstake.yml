name: Update Sweepstake Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update data file
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone

          data_path = 'sweepstake-data.json'
          if not os.path.exists(data_path):
              data = {'title': 'askporter World Cup Sweepstake', 'updatedAt': '', 'html': ''}
          else:
              with open(data_path, 'r', encoding='utf-8') as f:
                  data = json.load(f)

          data['updatedAt'] = datetime.now(timezone.utc).strftime('%d %b %Y %H:%M UTC')
          data['title'] = 'askporter World Cup Sweepstake'
          data['html'] = data.get('html', '')
          with open(data_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write('\n')
          print('Updated sweepstake data file')
          PY

      - name: Commit and push changes
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sweepstake-data.json
          git diff --cached --quiet || git commit -m "Update sweepstake data"
          if [ -n "$PAT_TOKEN" ]; then
            git push "https://x-access-token:$PAT_TOKEN@github.com/${{ github.repository }}.git" HEAD:main
          else
            git push
          fi
